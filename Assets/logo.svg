<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d1f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4c84ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Monitor body -->
  <rect x="56" y="96" width="400" height="256" rx="20"
        fill="#111827" stroke="url(#blue)" stroke-width="10"/>

  <!-- Screen bezel -->
  <rect x="76" y="116" width="360" height="216" rx="10" fill="#0f172a"/>

  <!-- Broadcast arcs (wifi-style) -->
  <path d="M208 230 Q256 196 304 230"
        fill="none" stroke="#4c84ff" stroke-width="18"
        stroke-linecap="round" filter="url(#glow)"/>
  <path d="M176 198 Q256 148 336 198"
        fill="none" stroke="#4c84ff" stroke-width="14"
        stroke-linecap="round" opacity="0.65" filter="url(#glow)"/>
  <path d="M144 166 Q256 100 368 166"
        fill="none" stroke="#4c84ff" stroke-width="10"
        stroke-linecap="round" opacity="0.35"/>

  <!-- Source dot -->
  <circle cx="256" cy="268" r="18" fill="#ff3d5a" filter="url(#glow)"/>
  <circle cx="256" cy="268" r="9" fill="#ff7096"/>

  <!-- Monitor stand neck -->
  <rect x="240" y="352" width="32" height="52" rx="8" fill="url(#blue)"/>

  <!-- Monitor stand base -->
  <rect x="168" y="400" width="176" height="20" rx="10" fill="url(#blue)"/>
</svg>
